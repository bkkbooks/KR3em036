body:
  text: 辨言喉科醫書多矣簡者不甚詳明繁者未盡精當皆非善本也以故喉風一發多有不救惟潘葆真先生喉科心法一編其辨論陰陽寒熱表裡虛實至明且當洵喉科之最善者也前湖南衡陽邑侯林端甫先生因衡郡喉風時作刊發是書如法而治者屢著神奇全活無算惜其書尚未編傳爰商同志醵金重刊存板於維揚書肆樂善者廣為印庶可以編傳而普救也夫光緒四年戊寅首夏衡陽浣月居士識於揚城之樹德堂臨症要訣夫人身五臟六腑十二經脈除足太陽經其餘十一經皆內循咽喉得以病之不獨肺胃也但有陰陽表裡虛實寒熱輕重緩急之不同必得真傳方能辨認大抵屬陽熱者十之六七屬陰寒者十之二三而風寒包相火者則十之八九臨症看喉之訣最要輕手快眼切莫心粗氣浮無論富貴貧賤老幼男女必令患者朝亮明處而坐使人托其頭夜則燃大紙捻照看醫者以箸按其舌根著意看其喉中左右上下形色自不同常或紅甚腫甚痛甚或微紅微腫微疼或紅甚癰甚而不腫或不紅不腫而只疼或不惟不紅腫且色白而疼痛或有形或無形或來勢急發於頃刻或從容緩發於數朝或喉里喉外皆紅腫或頭項腮頤並紅腫或因瘟疫肚熱大渴或感風寒發熱惡寒或已灌膿不速潰或潰後余腫不消或破爛或誤針既看其喉再看其舌有苔無苔或黃或白或潤或干或灰或黑又看兩唇淡紅淡白紅甚而焦或紫且黑問表症之有無審二便之通澀聞口臭之微甚察飲水之冷熱病有新久虛實迥別有表重於里有裡急於表有虛多實少有邪甚人強有純陽有純陰有陰居八九陽居一二有氣虛而有火血虛而有火者有陰虛虛火炎上者有火不藏源者或誤用溫補者或誤用寒涼者種種不同臨證切宜細辨再三審問詳其所兼現之症不可潦草了事若有表症不知表散遽投寒涼及末藥之類釀禍不小誤於溫補猶可挽回誤用寒涼過於攻伐多不可救古哲云以不足之法治有餘之症其錯猶小以有餘之法治不足禍則烈矣常見富貴人及婦女輩懶於下床看喉者此不可曲從床上看不明白關係非小須明論之女子年十四歲以後與夫師尼寡婦當問經水通閉有夫之婦必問娠妊有無數月嬰孩胎産婦人年高老人素虛弱人大病後人虛勞內傷人悉宜詳慎尤不可忽此皆臨症要訣實屬心法真傳學者一一遵守而行無不神乎其技矣其辨症治療制修丹散之法悉詳於後逐條潛玩自得其妙陽症喉痹痹者痛也痛而紅腫為陽痛而不紅腫為陰若人膈間素有痰涎蓄積或因好飲燒酒過啖雞魚牛羊煎炙厚味及薑椒等熱物或因忿怒失常或因縱欲多服助陽藥蓋過啖熱物火起於脾胃忿怒火起於膽縱欲火起於肝腎火動生風鼓激痰涎結聚於咽喉窄狹之處紅腫疼痛飲食阻凝小便赤大便結此為陽症喉痹治法必審其表症有無若無惡寒發熱頭痛咳嗽鼻塞等候多是暴寒折熱寒束於外熱鬱於內切不可遽用末藥吹噙及先投苦酸鹹寒清降涼瀉煎劑如芩連豆根射干石膏硝之類遏郁表邪不得外散以致表邪得以深入傳變多端因而釀成不治之症者指不勝屈當先用荊防敗毒散加蔥白香豉或再加牛子元參僵蟲連翹一二劑急急解散表邪然後用末藥吹噙方不誤事若失於未表散已經誤治而表症尚在急禁止吹噙末藥用荊防敗毒散連進二三劑體虛人加人參提出內陷之表邪亦可以救前誤昧者謂咽喉病忌用發散謬妄殊甚豈知薛氏醫案立齋先生用之屢矣此先表后里法亦逆流挽舟法也粗工那得知之凡表重於里者及表邪內陷者惟此法為最當若連日不食又克伐寒涼過度胃氣告匱正虛邪盛則用之無益且多不可救此時善刺者急針之或可救也至於表裡兩急之症又不得拘前説初起咽喉紅腫痛俱甚表則惡寒發熱頭痛身痛咳嗽里則口渴喜冷口臭氣粗舌生黃苔小便赤大便結或二便俱閉痰涎上壅語聲不出飲食不入是表裡兩急也法當雙解煎劑用荊防敗毒散合清咽利膈湯無汗加麻黃小便短赤澀痛加滑石大便不閉去芒硝末藥獨行散元珠丹七寶散諸方選用或用開關散擦牙齦或用巴豆油紙為捻點燃吹滅以煙燻其口鼻即開或用萆麻子去殼研爛紙卷作筒燒煙燻亦開如滿喉腫甚將閉藥不能進即用開關散四五分令仰其頭左手持箸按患者舌根右手持長柄匙挑散痛腫上以白湯灌之立時即松隨用七寶散等方連上十餘次莫歇手頓愈治之不失其時與法故有如此神效若曾經誤治耽延時日則速效難期也發表攻裡並行是謂雙解若無惡寒頭痛等症便無表邪焉用雙解祗當分輕重施治輕症煎劑以喉痹飲為主方中貝母花粉二味份量可加可減可去微紅微腫微痛可減不腫可去腫雖不甚亦不微又兼舌有黃苔口渴喜飲可重加銀花亦重加蚤紅甚更加山豆根數分微有惡寒頭痛即去豆根加羌活防風蔥豉此輕症之劑加減活法也末藥用豆硼冰片散足矣重症紅腫俱甚煎劑用清咽利膈湯大便不閉去芒硝末藥元珠丹磐珠丹七寶散選用極重者雄黃解毒丸開關散絳雪白雪金鑰匙等方選用有病人惡聞麝片香氣藥者惟七寶散最妙內無片射其效亦速或生白礬五分用雞子清同礬末攪勻灌喉中甚效以上皆治陽症喉痹定法按法施治無不效捷桴鼓但咽喉病不比他病貴在見幾蚤不難消散若因循失治又治不如法耽擱日期以致不消散勢必灌膿善刺者急刺之出血口內使針切記不可誤傷蒂丁俗名小舌損則不救慎之如畏針不肯刺急用真人活命飲方皂角刺用刺尖山甲取前足甲炒成珠加出蛾蠶繭微焙只用一個再加茅針一莖更好煎服一二劑隨用搐鼻散少許紙燃點納鼻內取嚏即潰乃代針妙法也既潰以茶湯或甘草湯漱淨膿血以海浮散加血竭上潰處提膿定痛自漸愈如紅腫痛尚未全退用鳳凰衣散上之俟其腫痛全退然後用六味地黃湯加麥冬五味或人參固本丸滋補真陰調理若因服寒涼攻伐太過而致潰久不愈者當補氣血以八珍湯多服乃佳戒發物一月如雞魚牛羊椒薑酒面水煙洋煙之類一月之內宜養息毋惱怒遠房幃乃善後也如不守戒多有愈而復作者治本為主兼治其餘邪醫者要再三叮嚀囑病者確遵醫戒方無反復舒弛遠曰火痛者內外俱腫且赤且熱氣粗口臭身輕惡熱水可多飲而飯粒殊覺難下可食軟不可食硬非若寒痛者可食硬不可食軟也凡陽症喉痹急症重症腫閉痛煩殺人最速者忌妄用針刀惟刺少商穴去其惡血最為神妙圖説詳後纏喉風即走馬喉風此陽症之中最急最惡者也突然而起暴發暴腫轉腫轉大滿喉紅絲纏繞疼痛異常聲音不能出湯水不能入痰涎壅塞閉脹勢如繩索絞喉故名纏喉風又名走馬喉風不急治即能殺人治之者必飛騎去救不可稍緩故名走馬乃實火為患臟腑積熱熱甚生風風火迅速鼓激痰涎堵塞咽喉隘地呼吸難通緩治則死法宜急刺少商穴出血以泄其熱用雄黃解毒丸醋泡七粒杵爛灌之患者或吐或瀉其喉即松若牙關緊閉不開即以解毒丸七粒茶湯泡研溶灌入鼻中令仰其頭使藥自鼻入喉牙關便開如不開再灌七丸無不開者或用開關散如前法或用巴豆油紙燃熏其口鼻皆開關捷法妙方也關開隨用絳雪散或白雪散或金鑰匙不拘連上腫處十餘次更煎服清咽利膈湯重用金銀花大便不閉去芒硝若兼惡寒無汗頭痛咳嗽鼻塞冬月加麻黃羌活白芷川芎夏月加蘇葉香薷薑蔥以解內外之寒邪否則不必加以上皆治急症成法大勢退邪未盡者改用緩治法荊防敗毒散加元參牛子或芩連或清咽利膈湯去芒硝及加味甘桔湯元參解毒湯連翹散等方選用末藥用七寶散或磐珠丹獨行散等方選用先當急治後宜緩治法之一定者也先後按法施治不失其時隨手應效者可十愈其十若治之不如法者十難救一面青唇黑鼻流冷涕及痰壅氣急煩躁神昏者不治婦人胎前産後及嬰孩與年老人虛弱人皆難任攻伐者多不可治此等險惡急症非下痰解毒丸散並施刺砭兼行焉能有濟臨症者必平日揣摩純熟閲歷又多胸中方有主張不可輕忽怠緩以誤人性命也患者戒發物慎起居遠房幃免病復返醫者當要叮囑緊喉風啞瘴喉風弄舌喉風此三症亦纏喉風類也症候大同小異因其鎖緊咽喉故名緊喉因其口緊牙緊不能出聲故名啞瘴因其舌脹出口不縮時時攪動故名弄舌皆險症也悉以上條治纏喉風法治之病名雖殊病源則一故治法無異此三症外治皆可用萆麻熏法大頭瘟喉痹並捻頸瘟喉痹其症憎寒壯熱口渴舌生胎刺頭面赤腫如匏瓜目不能開咽喉紅腫或閉塞語聲不出或口流濁水涎如紅汗此乃時行癘氣為病則延街合巷症候相同互相傳染惡症也不速治十死八九諸書治法不外普濟消毒散一半煎食頻頻服一半蜜丸噙化服口渴甚加石膏大便硬加酒大黃耳前後上下赤腫加紅柴胡栝蔞霜或用青栝蔞連穰切片用更好腦後頭項赤腫喉痹名捻項瘟加荊防羌活獨活川芎射干炒焦或用荊防敗毒散以人中黃易甘草加芩連僵蟲喬蒡末藥七寶散或金鑰匙等方選用若牙關緊閉不省人事者多不可救捷法於初起時用兩手將病人兩肩項處著力趕勒至兩手腕數次隨刺兩少商穴出惡血更用搐鼻散少許納鼻中取十餘嚏若搐藥不嚏者不可治並刺患上出血其頭面項頸赤腫處用砭針刺之刺出血後用雞子清去黃調乳香細末攪勻頻頻以潤刺處牙關雖緊神不昏者雄黃解毒丸開關散熏鼻等法皆可施治常見瘟疫喉痹有朝發夕死者不可不知也但看此等病宜防護自己必用闢瘟諸良法方不沾染單蛾雙蛾此症生咽喉之旁狀若蠶蛾一邊生者為單兩邊俱生者為雙亦有形如棗栗如乳頭者故又稱乳蛾肉蛾形似鰍魚又稱鰍症紅腫疼痛痰涎上壅飲食阻礙凡紅腫無形為痹有形是蛾無非積熱所致但有輕重之分初終治法依陽症喉痹條審輕重治之自然消散若不消可針則針之凡針乳蛾宜針頭尾不可針中間鮮血者易愈血黑而少者難痊切不可傷蒂丁損則不救慎之蒂丁俗名小舌喉疔亦急症也生喉間形似靴釘尖而且長紫黑堅硬初起麻癢旋即大痛急用喉痹飲多加白菊花煎服或單用菊花連根帶葉生用二三兩煎湯頓服尤效野菊花葉亦好又用露蜂房蛇蛻各用火煅存性每服一錢酒調下輕者一服立效重者連進二服少頃腹中大痛痛止即愈但須及早下手不可遲延無不內消若治之不早便難消散惟針刺出惡血以紫金錠磨塗患上更磨服一錢鎖喉毒此症初生於耳前形如瘰癧漸攻咽喉紅腫塞痛妨礙飲食治不可緩以喉痹飲重用銀花貝母或用真人活命飲加紅胡香附子去毛酒炒煎服如大便脹閉不通口渴喜冷惡熱即宜清咽利膈湯煎服吹噙以元珠丹七寶散獨行散諸方選用速消散為吉上齶癰此症生於上齶形若紫葡萄疼痛異常寒熱大作防毒攻腦先服荊防敗毒散加金銀花連翹牛子次服真人活命飲內熱甚加酒炒黃連大便閉結加酒大黃連進數劑兼進蠟礬丸未灌即消已灌即潰潰後用海浮散上破處提膿生肌改服歸耆飲如過時失治飲食不能入煩躁神昏者逆喉瘤此症或單或雙亦生喉旁不紅不痛與蛾子異不可妄作蛾症治忌針又忌服苦寒酸鹹之藥法宜多服八珍湯久久自消脾虛食少泄瀉者六君子湯兼進腹脹痛加木香砂仁中寒腹痛加炒黃建薑上桂去皮誤服寒涼過多者加味理中湯服補藥後漸轉微紅微痛者改用附桂八味地黃丸自然全愈喉瘡此症初起咽喉乾燥如茅草常刺喉中痛而且癢日久其色紫暗不鮮漸漸腐爛時吐臭涎疼痛日增防礙飲食病由腎水久虧相火炎上而又過食煎炙厚味燒酒五辛熱物積熱於胃口臭口渴舌燥苔黃牙齦腫痛口舌破爛乃相胃二火熏肺而成斯疾法當補腎水清胃熱宜甘露飲胃熱甚兼進清胃散或知柏地黃湯吹噙鳳凰衣散或加熟石膏甘草或加飛過建黛少許酒炒黃柏少許薄荷葉少許患者清心寡欲戒食雞魚牛羊燒酒洋煙水煙檳榔炙炒厚味甘淡泊以調養方許可治不然必致腐爛延久疊起腐衣旁生小孔若蟻蛀蝕狀飲食不能進多致不救更有心腎脾胃素虛之人服寒涼克伐藥過多以致脾胃愈虛真陽益衰陰翳之火客於咽喉腐爛成穴而不痛胸膈脹悶夜不能寐飲食不思者亦危症也急用馮氏全真一氣湯濃煎頻服兼進歸脾湯去木香加熟地上桂炒黃建薑稍愈即以附桂八味地黃丸每早須用淡鹽湯吞五錢以加減歸脾湯調養心脾氣血飯後良久服能如此調理亦可轉危為安然皆不易也喉舌破爛此症有因風熱陽症之輕者初起紅腫痛不甚尚可飲食不自提防乃赴筵席飲香醪啖厚味不逾時紅腫痛大作不能食而破爛有因患陽症服清解藥已漸愈昧者遽投以溫補熱藥致令病返紅腫大痛破爛二症並宜先用陳細茶泡取濃汁漱淨口喉隨以獨行散合鳳凰衣散頻上爛處莫歇手有膿合海浮散加上竭內服加味甘桔湯數劑可愈愈後戒洋煙水煙檳榔雞魚牛羊肉辣椒子薑一切發物一月免病返復此乃治誤食熱物誤用溫補之方法也若喉痛日久屢用末藥吹噙頻服寒涼克伐煎劑致漸漸腐爛成孔大小不一愈久愈爛不紅不腫其色紫暗痛亦不甚飲食勉強可吞有牙垽爛去半邊者有蒂鍾爛至全無者蒂鍾俗名小舌有數月而斃者有延至數年斃者此乃誤服寒涼過服寒涼之症噫苦寒殺人實可畏也總由治之者不明虛實不審陰陽不辨寒熱真假末藥妄投寒涼肆用以致大傷後天氣血及先天真陰真陽腎中虛火客於咽喉而爛不比陽症之火可用寒涼此是陰翳之火大忌寒涼得寒涼其火益熾惟太陽一照龍雷自息但看病至如此治療良難法惟救本勿稍從事乎標大補後天氣血更補先天真陽真陰歸脾湯八珍湯十全大補湯四君子六君子湯皆後天藥也六味地黃丸附桂八味地黃丸皆先天藥也隨症斟酌選用飯後良久服後天藥早晚空心服先天藥其間孰賓孰主或加或減或進或退則又權宜在心如此煎丸並進慎起居守禁忌調補半載方能化凶為吉轉禍為福否則恐無生理吹噙末藥祗可用鳳凰衣散去橄欖加珍珠研極細末如眼藥樣粉甘草去皮研極細篩取淨末等分勻上爛處余諸種末藥皆禁用病者宜潛玩深思而熟記焉陰症喉痹此症咽喉雖疼痛異常卻不紅腫或且帶白色口不渴喜飲滾湯不多小便清長或兼腹痛泄瀉手足厥逆手足冷為逆冷過肘膝為厥逆或頭痛如破身重惡寒表症惡寒寒在外宜汗陰症惡寒寒在內宜溫忌汗或頭重如壓身體痛自汗喜睡或微熱面赤乾嘔厥逆面赤者腎中真陽發露名戴陽症微熱者陽外越也喉間清涎成流而出脈沉微細乃足少陰腎經中寒之重症也由其人腎中真陽本虛寒邪乘虛直中其經逼其微陽上浮而為咽痛是無陽純陰之症故名陰症喉痹無論冬夏當用四逆理中薑附等湯冷服以溫腎經咽痛自止切禁表散清降寒下諸法誤用必死當知陰陽喉痹兩症病源如冰炭之殊故治法有天壤之別奈何但知有熱咽痛而不知有寒咽痛豈不聞仲景先聖云下利清穀水瀉也裡寒外熱陽外越也脈微欲絶面赤腎陽發露也咽痛不紅腫手足厥逆或腹痛或乾嘔四逆湯急溫之遲則不救又曰冬月寒入腎經發則咽痛不紅腫下利瀉泄也附子湯溫其經則愈先哲李東垣云夏傷寒伏於腎經多咽痛不紅腫多腎傷寒宜熱藥冷飲之舒馳遠先生治一人少陰中寒喉痹不紅腫津垢結而成塊堅白如骨橫於喉間痹痛異常又惡寒喜睡不渴懶言舌苔滑而冷二便不利症屬虛寒何以二便不利蓋為陰寒上逆喉間清涎成流而出津液逆而不降故二便不利便閉之症有熱有寒不可不知乃用生附子去皮臍切片甘草湯泡洗先煎數十滾然後入諸藥驅陰散寒熟附子助陽溫經法夏辛以開之甘草甘以緩之黃耆以助胸中之陽白朮以助脾中之陽接引真陽上達投一劑喉間白骨即脫去其半痛痹稍緩略可粥食小便漸長再劑大便行糞多且溏三四劑全愈更有陳藏器蜜附子法治少陰感寒咽痛不紅腫猝然如啞吞吐不利以大附子去皮洗淨鹹味再用甘草湯泡洗切片蜜塗炙黃每用一片口含咽津候甘味盡又換以效為度若喉內如松子及魚鱗狀不堵塞者此虛陽上浮宜此法俱忌苦寒以上皆治陰症喉痹成法一定之理也舒馳遠曰寒痛不赤不熱不腫不作臭穢身倦惡寒略可硬飯飲水吞津則痛甚可食硬不可食軟非若火痛可食軟不可食硬也氣虛喉痛時痛時止微紅微腫或不紅腫右手脈大而空或浮小而緩每遇勞動及服涼藥則更甚兼現食少困倦少氣懶言唇淡面白二便調和身微熱或時熱時退手足心更熱諸症此中氣不足虛火泛上也法當補中益氣為主立齋先生每用補中益氣湯加玄參麥冬黃柏酒炒焦黑二三分知母酒炒焦黑二三分屢效余遵守其法用之亦屢效若服寒涼藥過多者則去玄麥知柏而少加炒黃連薑薄上桂各數分丹溪先生治服寒涼過多之喉痛用附子理中湯凡氣虛喉痛治法皆當準此有於補中湯內加茯神志肉棗仁熟地上桂者是補中兼補心腎也更有中氣不足面肝腎亦虛者常有用補中煎濃湯吞六味地黃丸多服自愈不可用末藥吹噙此皆治氣虛喉痛定法昧者畏耆朮薑桂執用寒涼清潤滋陰降火因而死者不少慎之血虛喉痛紅而不腫或時痛時止左手脈數無力午後潮熱或痛在午後午前不痛心煩口苦舌乾手足心熱法當補血四物湯加黃柏知母知柏俱用酒炒焦先服數劑隨去知柏加酒蒸玄參甘桔自愈然後以人參固本丸調補之此症有用四物湯加竹瀝者有四物湯加芩連者芩連俱用酒炒焦愈後必以六味地黃丸加麥冬五味或加當歸酒白芍多服虛甚者更佐以八珍湯間進加味逍遙散陰虛有表補陰益氣煎忌用末藥吹噙血虛咽痛治法大概如此至於隨症變通則又存乎其人但要詳慎斷不可失之輕忽也陰虛喉痛其人平日常有齒痛舌痛牙縫出血咽乾喉燥耳鳴盜汗夢遺夜熱夜咳之症偶然受熱或食熱物或犯房欲即咽喉痛紅腫或紅甚而不腫夜甚於晝脈洪數或細數由腎中真陰虧損故也人之腎中有水有火水即真陰火即真陽所云相火龍火即此火也水火不同宮水不虧足以濟火足以制火火藏水中自不為患水一虧則火無所濟而無所制遂得逞其炎上之性腎之絡脈挾咽循喉系舌本火不藏源熱必循經絡浮越上衝而為咽痛故名陰虛喉痛苟不細心審辨一認作陽症喉痹則誤甚陰虛喉痛與陽症喉痹雖皆由於火而陰陽虛實迥別豈容混治陽症之火起於六腑陽分是後天有餘之火實火也實火可去故用苦寒鹹寒以直折之陰虛之火起於腎經陰分是先天不足之火虛火也虛火不可去忌用寒涼及麝片香藥誤用之其火愈熾益促其危耳惟大補其水以濟之以制之並引導斂納之則是矣六味地黃湯加麥冬五味大劑作湯頻進或加大本支生地酒蒸玄參酒蒸淮牛膝酒蒸若加之氣喘面赤口乾喉中如火熏灼兩手寸關脈細數兩尺微細無神或寸脈洪大尺脈微弱乃腎中真陰真陽並虧無根之火客於咽喉又當用附桂八味地黃湯濃煎微溫服以引火歸源或加酒蒸淮牛膝麥冬五味馮氏全真一氣飲張氏鎮陰煎皆可選用愈後八味地黃丸為主宜久服之一切末藥皆忌用戒酒色新雞子鴨一切助火之物及檳榔洋酒等件能清淡寡欲藥始有驗否則難免反復此治陰虛喉痛之定法學者宜潛玩而熟記焉癆嗽咽喉痛此症多屬陰虛火炎肺腎兩傷忌用寒涼及喉科通套湯劑與末藥惟紫菀湯補肺阿膠散四君子合生脈散加阿膠川貝母等方可選用更參以前條治陰虛喉痛之方兼之顧脾胃為要然而甚不易也如其人能絶酒色戒食鹹味煎炒厚味及新雞子鴨牛羊鱔魚洋煙水煙檳榔等物又不犯七情謹慎寒暑不誤服涼藥庶可轉禍為福以延歲月否則難矣若喉中破爛用鳳凰衣散去橄欖加珍珠研細如眼藥樣每以少許上爛處其他藥俱忌用咽喉痛失音咽喉聲啞須分暴久暴病得之皆可治之症如喉痛起於四五日間是暴病也咳嗽聲重吐稠痰惡寒發熱頭痛咽喉紅腫其聲嘶啞此熱結於肺寒束於外也先用辛涼之劑荊防敗毒散加蘇葉北辛杏仁炒牛子蔥豉薑汁以散之然後加石膏以清之或麻杏甘石湯重加生玉竹肥人痰多者再用法夏蘇陳皮去內或枳桔二陳湯體實者加味導痰湯皆對症湯劑又有暴病聲啞咽痛異常不紅不腫猝然而起或欲咳而不能或清痰而上溢脈沉細或弦緊此大寒犯腎宜蜜炙附子噙之不可妄投寒涼之劑二症寒熱天淵不可不辨更有因大喊大叫聲嘶微痛失音者當用十全大補湯亦不可妄投涼藥以上皆治暴症失音成法理之一定者也至於久病失音虛癆症也謂之金破不鳴雖精明老醫且難動手故多不可治無人參真阿膠亦不可治專門喉科者俱勿妄參末議梅核氣此症咽喉不痛不紅腫患者自覺咽中如有物狀或如破絮咽不下咯不出似硬非硬窒礙不舒乃由七情氣鬱鬱則生涎結聚於胸膈之間甚則膈間痞滿噁心嘔逆治不如法防成膈噎法當散郁開結宣暢胸膈先進四七湯次用六君子湯加砂仁波蔻仁調理多服自愈婦人胎前産後喉痛妊婦喉痛用藥不同平常當知忌避如芒硝大黃牙硝穿山甲皂角刺附桂及雄黃解毒丸開關散等藥皆所禁用其發散清解法中必兼保護其胎為要輕症緩症荊防敗毒散與喉痹飲皆可用必以四物湯佐之為穩吹噙藥豆硼冰片散獨行散鳳凰衣散選用重症急症刺少商穴牙關不開巴豆油紙捻點燃吹火熏其口鼻又用搐鼻散少許納鼻中取嚏隨用雞子清方灌喉中次用獨行散豆硼冰片散噙咽煎服清咽利膈湯去硝黃實症陽症治法如此虛症有氣虛血虛陰虛陽虛陰陽兩虛及陰症喉痹俱照各條施治真陰真陽兩虛火不歸源必用桂附八味陰症必用薑附妊娠忌桂附是法之常有時用桂附是法之變昧者畏桂附恐其墮胎殊不知陰症不用附子其母必死未有母死而胎能保者若拘常格兩命俱亡祗辨症明認症確通權達變方能救人內經云應犯而犯似乎無犯又曰有故無隕明者知之而庸工何能曉此也至於産後喉痛治法與胎前又不同産後惡寒發熱身痛是因百脈空虛故惡寒血虛故發熱營衛筋骨失養故身痛虛火上浮故咽痛切不可認作表症而用表散之藥以致有誤變症百出有不測之禍獨覆水難收也不惟表藥當禁一切寒涼清降之劑皆不可犯誤用禍不旋踵治法惟有溯源救腎湯一方用之極效極穩多進無有不愈者瘀血不行小腹脹痛拒按可加益母草四五錢或加蒲黃五靈脂各二三錢感冒風寒鼻塞頭痛聲重咳嗽加蘇葉老生薑不可獨用發表之藥以致貽禍如真陰不足用六味地黃湯補水以制火真陰真陽並虧無根之火浮越於上者用八味地黃湯補水以導火後天氣血兩虛者八珍湯虛之甚者人參養營湯更有腎虛火不歸經身發大熱煩渴目赤唇裂舌上生刺喉如煙火足心如烙吐痰如湧喘急咳嗽大便祕結小便淋瀝脈洪大無倫按之微弱者極似陽症誤服涼藥必死宜十全大補湯吞八味地黃丸諸症自退此症極難辨認非精於脈理者不能動手此等假陽症世之服涼藥致斃者指不勝屈總之産後元氣大虛新血未生凡有頭痛發熱咳嗽咽乾喉痛諸症皆是虛中變現之象概以補虛為主毋得妄投克伐因疑似之外邪傷真切之元氣豈不誤甚見聞淺薄者慎之慎之雖然若體實少壯婦女及藜藿輩産後已多日而間有患陽症喉痹者則又不必拘前説也幼小喉痛幼小之病稍大能言若數月嬰孩有病不能告人人何以知其喉痛也當細察其情每吮乳便啼哭或不能吮乳必令抱兒於亮處仰其頭以箸按其舌根看喉中有何形色紅腫否並看舌上兩邊及上齶牙齦諸處或生上齶癰鎖喉毒兒腮癰木舌重齶重齦馬牙鵝口瘡之類務明白按法施治不容稍緩嬰兒腑臟嬌嫩最不耐病且以乳為命不能吮乳延至二三日胃中空虛雖服對症之藥苦無胃氣運行多難見功胃氣一絶神丹不可為已如牙閉緊用巴豆油紙捻熏法刺少商穴或用雄黃解毒丸三粒研爛茶泡灌鼻內仰其頭使藥由鼻入喉即開若有發熱惡寒鼻塞咳嗽無汗表症必用荊防敗毒散加蔥豉疏散然後按法施治用藥不可輕忽夭人命也肺絶喉痹不治症也其脈浮散或微細將絶或洪疾無倫重按全無或現雀喙屋漏魚翔蝦遊彈石解索釜沸等脈其聲如鼾如痰響在喉中此肺氣將絶之候其因不一一因陽症喉痹有表症法宜急發散昧者妄謂咽喉不宜發散遽投寒涼清降及吹噙末藥致使陽郁不伸表邪無門而出又用寒涼攻下益令邪陷於裡一誤再誤表邪終不能出寒涼徒傷中氣以致胃敗肺絶而然一因誤將陰症作陽症治錯用寒涼所致一因陽症之輕者如虛弱人患陽症俱宜用輕劑乃重用寒涼及服草藥投之不已傷敗肺胃之故一因衰老及痘後婦人産後妄投寒涼克伐之變遍考諸書治法惟速煎獨參湯二三兩入真陳橘皮少許縱飲之有服至數斤者早服者十全八九次則十全三四遲則十不救一古之治法如此近時參貴異常有力之家且不能多用況無力者乎惟束手待斃而已嗟嗟肺絶之症皆由醫之不明不慎釀成可見苦寒最能殺人妄用藥者造孽無邊可不知所畏哉雜症氣衝攻腹繞喉此乃肝膽厥陰肆橫久久虛損而嘔痰減食皆犯胃之象若不靜養經年必甚甜北沙參白扁豆炙草生黃耆皮炒茯神用白糯米半升泡清湯煎服臍上一點氣上至咽喉如水程篁墩曰大平侯病膻胸也中痛喘嘔吞酸臍上一點氣上至咽喉如水每子後申時輕發醫以為大寒不效祝橘泉曰此得之大醉及厚味過多子後申時相火自下騰上故作痛也以二陳湯加芩連梔子蒼朮數飲而愈氣從小腹上衝胸咽孫真人千金方云咳唾手足厥逆氣從小腹上衝胸咽其面如醉而翕熱因復下流陰股小便難時復昌者寸脈沉尺脈微宜茯苓五味子湯以治其氣衝其方用茯苓五味子各二錢桂心甘草各一錢水煎服胸滿者去桂喉腫外見五色紋喉忽腫大非癭非瘤忽痛忽不痛外現五色之紋按之半空半實此乃痰病結成似瘤非癭似癭非癭也方用海藻三錢半夏三錢白芥子三錢貝母三錢南星三錢人參三錢茯苓五錢昆布一錢附子一分桔梗三錢甘草一錢水煎服此方乃清上焦之痰聖藥也又有海藻昆布以去癭瘤之外象消其五色之奇紋妙在消痰而仍不損氣則胃氣健而痰易化也一劑知二劑消三劑則全消四劑永不再發此方兼可治癭症神效咽喉若有物相礙而不爽利此為火逆上氣無咳逆吐痰水雞聲等證但覺咽喉若有物相礙而不爽利法宜止逆下氣以麥門冬湯主之麥冬七升半夏一升人參甘草各二兩粳米三合大棗十一枚此為火逆症而出其方也此症絶無外感邪氣亦無咳嗽故用人參否則人參不可姑試也咽生息肉先將息肉刺破令出血用鹽豉和抖塗之立效咽喉痛屬陰陽毒症陽毒咽喉痛其症面赤斑如錦紋吐膿血五日可治七日不可治以升麻鱉甲湯主之升麻當歸甘草各二兩鱉甲蜀椒一兩炒雄黃五錢陰毒咽喉痛其症面目青身痛如被杖五日可治七日不可治以升麻鱉甲湯去雄黃蜀椒主之二症是感天地非常災癘之氣從口鼻而入咽喉致死甚速治不可緩也出金匱陰陽毒門腳根喉痛此症從腳根發起直至喉間或一年一發或半年一發其病一日行一穴切忌熱物怒氣初起用緑礬三分煅硼砂六分元明粉五分冰片一分麝香五釐共研末吹入少許再用羌活獨活桔梗防風黃耆白芷甘草茯苓陳皮前胡柴胡白芍元參牛子煎服如纏惡起泡者難治煙袋杵喉誤針傷喉用人參三七為細末搽傷處或用劉寄奴為細末過絹篩搽傷處或用海浮散加上血竭研極細末吹傷處以上三方功用相等皆極效者誤針傷出血不止於三方內隨用一方無不立效諸骨哽咽凡為諸骨大難咽者以鵝翎入喉探吐之或用箸重按舌根即吐或用白砂糖一大匙和銅緑末半匙入麻油少許茶湯調服即吐出如不吐用牙皂研末吹入鼻中取嚏即出骨小者用威靈仙三錢煎濃汁時時噙咽其骨自軟如綿而下穀皮樹葉搗爛取汁煎噙咽亦可魚骨哽咽食橄欖數枚即下如無鮮者用核十枚火煅存性研細末水調服並噙咽莫歇自化或用獨頭蒜塞鼻中自出或用皂角末吹鼻中取嚏即出或用鴨垂倒吊垂涎服之或鸕鷀骨煅灰蜜調噙咽與白鷺骨同功嘴骨尤良稻芒粳殼哽喉用鴨倒吊取涎徐咽即下竹草芒刺哽咽用象牙磨濃汁水調服誤吞金銀鋼鐵用活磁石能吸鐵者火煅透研細末以黃蠟溶化和丸如豆大水吞下自同大便而出或用象牙磨濃汁服或多食肉自下又方用櫪木燒炭帶紅研末以白砂糖調服或多用砂仁煎濃汁服之其物即從大便出又方取羊脛骨煅灰羊頭骨亦可用米湯調服二三錢自從大便而出又方殺白鴨取生血乘熱頓飲數杯其金銀即下誤吞針可用前法或用煮蠶豆同長韭菜食之針與韭菜自從大便而出或用養活磁石能吸鐵者取棗核大以絲錦繫緊入喉中少頃所吞之針吸在石上攝出誤吞銅錢多食荸薺或多食核桃或多食蒜白或用韭菜莫切斷同豬肥肉吃自從大便而出誤吞頭髮繞喉不出用自己亂頭髮洗淨燒灰存性研細末過篩白湯調服一錢誤吞水蛭即螞蝗腹中痛用田中泥為丸空心水吞百丸其蟲隨泥瀉出或多食白蜜亦化搶舌風著力咯出血即愈再用匕醋噙一時許吐出諸骨哽喉及竹木刺入咽喉臘月取大鱖魚膽懸簷下陰乾每用皂子大研細兌酒溫服得吐則所哽之物隨涎而出未吐再服以出為度如無干者即取鮮者或青魚鯽魚草魚不拘酒調服二三枚亦能吐出又方刮取象牙末溫湯調服亦能吐出小兒木舌虴舌舌腫脹舌瘡破爛舌腫滿口堅硬疼痛乃心脾積熱火盛血壅也不急治為害不小用粗線扎針箸頭上露鋒芝麻長刺舌兩邊令出血甚者多刺為妙隨以溫水洗之用蒲黃篩取淨粉頻搽舌上更以碧雪散蜜調搽之自消刺時只刺舌尖及舌兩旁切不可刺舌中心及舌下犯之出血不止其刺出之血紅者毒輕紫者重黑者危內服瀉黃散或沆瀣丹又有舌忽然腫大脹硬即時氣絶名為虴舌用青礬一二錢置新瓦上火煅變紅色為度置地下候冷研搽舌上立愈重舌木舌用之皆效又一方治舌腫脹用萆麻子去殼紙包捶爛使油透紙上作捻子點燃吹滅以煙燻舌上良久自消若舌上生瘡破爛用薄荷葉八分黃柏八分飛過建黛四分共為細末搽之或用鳳凰衣散重舌附舌旁生短小而痛有連生數枚者亦心脾蘊熱使然也內外治法同木舌重齶上齶腫起紅痛啼哭煩躁唇紅黑紫大小便不利上焦實熱也內服沆瀣丹外搽碧血散若有表症先服荊防敗毒散加白芷連翹次用沆瀣丹如不消散可用真人活命飲重齦牙齦腫痛也治同重齶鵝口瘡滿口白屑癍點作痛亦有不痛者甚則心煩口渴溺赤咽喉亦紅腫痛不能吮乳若身熱者用敗毒散加牛子荊芥防風元參花粉豆根無身熱者用元珠丹搽之即愈甚者服沆瀣丹一劑立愈馬牙小兒生下百日內每多有此生於牙齦上白泡子如牙用元珠丹搽之自愈兒腮癰此症生於兩腮肌肉不著骨之處高腫紅色焮痛連及咽喉初起寒熱往來者荊防敗毒散加白芷銀花次服真人活命飲口渴便閉溺赤加大黃芩連梔子俱酒炒外用如意金散以白蜜調敷無不消散若平塌不紅者內服外敷皆忌用寒涼之劑臨此病者亦宜斟酌不容掉以輕心內服諸方荊防敗毒散桔梗二錢薄荷八分甘草一錢枳殼炒五分雲苓小便赤用赤苓紅柴胡北條風前胡羌活表虛多汗輕用川芎荊芥獨活各錢半蔥白不去根三寸淡豆豉三十粒或加牛子二錢炒連翹錢半煎溫服取微汗強壯體實人二三劑虛弱人及小兒分兩減輕更加人參數分一二劑清咽利膈湯大黃酒洗二錢白芒硝一錢芥穗錢半甘草北風一線牛子連翹黑梔仁桔梗竹葉玄參薄荷酒芩黃連酒炒五分銀花二錢無汗加麻黃小便赤痛加滑石大便不閉去芒硝喉痹飲前胡牛子元參浙貝花粉各二錢僵蟲泡去石灰一錢半銀花桔梗各三錢薄荷八分荊芥錢半甘草半錢燈芯三尺方中貝母花粉可減可加可去微紅腫可減不腫可去若紅腫雖不甚亦不微兼之口渴舌生黃苔可重加並重加銀花紅甚加豆根數分真人活命飲銀花五錢北條風一錢歸尾白芷陳皮甘草浙貝花粉穿山前足甲蛤粉炒成珠各錢半皂刺尖赤芍各一錢茅針一根出蛾蠶絲一個乳香去油沒藥去油各一錢二味後入煎兌水酒頻頻咽之六味地黃湯熟地八錢山藥炒四錢棗皮酒蒸丹皮酒洗雲苓各二錢澤瀉匕水炒錢半空心服忌蘿蔔蔥蒜無鱗魚禽畜血知柏地黃湯六味地黃湯加知母酒炒五分黃柏匕水炒五分八味地黃湯六味地黃湯加熟附子一錢五分上安桂去皮一錢八珍湯高麗參或用洋參加蜜炙上色黃耆以佐之焦白朮雲苓各三錢炙甘草正芎歸身酒洗一錢熟地五錢酒芍二錢煨生薑大棗加味甘桔湯即喉痹飲加減喉痹飲見上頁元參解毒湯玄參三錢黑梔仁甘草淡竹葉芥穗各半錢生地酒泡三錢粉葛桔梗各二錢片芩酒炒八分燈芯三尺連翹散連翹粉葛赤芍酒炒桔梗牛子炒淮通各二錢片芩酒炒升麻竹葉各八分黑梔仁甘草各一錢寸冬三錢燈芯三尺普濟消毒飲酒芩三錢酒連錢半陳皮玄參連翹牛子炒板藍根如無即以建黛用清水飛過代之馬勃甘草桔梗紅柴胡僵蟲各二錢人參三錢升麻薄荷各七分歸耆飲生黃耆當歸酒洗銀花各五錢甘草三錢煎服或兌糯米酒初起銀花重用可加至二三兩其餘藥不加六君子湯人參三錢漂白朮五錢雲苓三錢炙草二錢陳皮去白一錢法夏錢半生薑大棗引去夏陳即四君子湯理中湯人參漂白朮建薑炒炙草加味理中湯理中湯或加法夏木香或加上桂砂仁隨症酌用附子理中湯理中湯加附子甘露飲天冬去心二錢麥冬去心二錢熟地八錢黃芩酒炒八分生地二錢酒浸一日茵陳酒炒二錢枳殼甘草各一錢真金石斛四錢如無真者即用霍川石斛枇杷葉密炙二錢煎熱服清胃散升麻三錢粉葛一錢黃芩酒炒六分當歸酒洗二錢生地酒浸五錢丹皮五錢煎熱服凡一切涼藥總宜熱服方內或加熟石膏連翹牛子銀花隨症酌入全真一氣湯熟地八錢可加至二三兩漂術三錢麥冬三錢米炒北味五分蜜蒸牛膝酒炒二錢附子錢半入黑鉛一塊煎濃微溫服氣虛者人參湯兌服歸脾湯蜜耆人參漂術茯神棗仁炒南木香當歸各三錢炙草錢半志肉八分龍眼五枚士殼核紅棗二枚去核煨薑三片濃煎服四逆湯生附子一枚去皮切片洗淨鹹味再用甘草湯泡洗大者用一半建薑二錢生用不炒炙甘草四錢久煎候附子熟方不麻口冷服薑附湯四逆湯去甘草附子湯焦術一兩熟附五錢雲苓四錢人參六錢煎濃煎濃溫服補中益氣湯蜜耆生用亦可漂術各三錢陳皮五錢去白升麻蜜炒三分紅胡蜜炒三分人參三錢炙草錢半歸身三錢生薑大棗引補陰益氣煎即於前方去耆術加熟地淮藥為陰虛人表劑四物湯熟地六錢血熱加生地當歸四錢酒洗酒芍二錢半血熱生用川芎錢半生脈散人參麥冬五味子加味逍遙散當歸酒洗五錢黑梔仁炙草各一錢紅胡八分白芍二錢半丹皮去骨酒泡雲苓漂術各二錢薄荷五分生薑引鎮陰煎熟地八錢牛膝酒炒二錢澤瀉匕水炒上桂去皮附片各一錢用黑鉛二塊同煎紫菀湯紫菀茸二錢知母八分蜜蒸再用酒炒焦乳真川貝三錢糯米拌炒仍去米高麗參四錢上洋參亦可茯苓二錢拌蒸曬乾五味一錢蜜蒸炙草二錢桔梗一錢阿膠四錢蒸滲或加玄參一錢酒蒸麥冬一錢炒補肺阿膠散馬蔸鈴一錢去殼牛子炒一錢炙草二錢杏仁一錢去皮尖炒黃真阿膠八錢蒸滲用糯米一撮煎服麻杏甘石湯麻絨二錢炙草錢半杏仁十三粒去皮尖熟石膏三錢生薑引二陳湯陳皮法夏茯苓甘草枳桔二陳湯陳皮二錢去白法夏四錢茯苓二錢甘草錢半枳殼二錢炒桔梗三錢老薑汁半杯兌服或加桑白皮杏仁加味導痰湯陳皮去白茯苓枳殼炒真膽星杏仁去皮尖炒研桔梗各二錢桑白皮錢半法夏四錢甘草錢半或加石膏知母栝蔞霜老薑汁十全大補湯人參漂術荷葉包飯上蒸蜜耆歸身酒洗各三錢茯苓酒芍各二錢炙草川芎各一錢熟地五錢上桂八分上皮研泡或蒸兌煨薑大棗引四七湯一名七氣湯法夏五錢茯苓三錢川朴錢半薑汁炒蘇葉一錢大棗二枚老生薑三片或用薑汁兌服溯源救腎湯麥冬米拌炒焦去米熟地各五錢漂白朮杜仲酒炒牛膝酒炒各二錢白芍灑炒白茯苓續斷酒炒各錢半建薑炒黑六分蓮肉七枚去心燈芯三尺人參養榮湯十全大補湯加五味陳皮志肉去川芎瀉黃散黃連酒炒五分黃柏酒炒五分黃芩酒炒五分黑梔仁八分赤茯苓八分澤瀉八分茵陳酒炒八分燈芯三尺煎熱服沆瀣丹川芎酒洗大黃酒蒸黃芩酒炒黃柏酒炒各九分赤芍酒炒黑醜取頭末炒檳榔枳殼炒白滑石刮去紅土連翹各六分薄荷四分煎熱服月內之兒減半用之人參固本丸熟地生地天冬麥冬各四兩人參三兩蜜丸每服五錢中寒人忌服雄黃解毒丸雄黃選明亮的研細水飛取輕浮者澄水去水曬乾一兩真蟬肚鬱金曬乾研細一錢巴豆去殼取白肉十四粒去皮炒熟研細紅包壓去油如法制過合研碾勻用米醋煎濃汁和丸如緑豆大每服七丸茶湯泡軟杵化送下不可過七丸雄黃破結氣鬱金散惡血巴豆斬關奪門能下惡涎此屬厲劑苟非急切不可妄投蠟礬丸淨黃臘二兩生白礬三兩研細將蠟煎融離火候蠟稍凝入礬末攪勻乘熱作丸如緑豆大每服二三十丸白湯下外治諸方獨行散山豆根切片炒燥研細過絹篩每兩入冰片四分碾勻元珠丹元明粉精製五錢白淨硼砂飛過硃砂冰片五分碾勻盤珠丹蛇蛻洗淨曬乾燒存性生白礬生石膏硼砂各三錢合研入冰片五分碾勻七寶散直殭蠶泡去石灰炒燥牙皂去兩尖及邊全蠍要頭足全者炙出煙支毒以煙盡為度硼砂飛過雄黃白生礬各一錢膽礬五分合研碾勻開關散巴豆六粒去殼每粒分作兩片牙皂三錢去兩尖及邊切炒白礬五錢先將白礬於火上化開次入二味攪勻待礬枯研細更入生白礬末五錢同研每用三分灌喉中痰涎在喉者即吐在膈者即下牙關即開巴豆油紙捻用巴豆去殼炒研以紙包數屢壓之其油盡透紙上收之以急用或用巴豆末捲紙捻亦可豆硼冰片散山豆根炒硼砂各一兩合研入冰片一錢碾勻絳雪散硼砂二錢生石膏一錢熟石膏錢半牙硝一錢硃砂一錢冰片五分碾勻或加制僵蟲一錢蒲黃粉一錢白雪散即絳雪散有膽礬元明粉無硃砂金鑰匙牙硝一兩硼砂五錢制僵蟲一錢明雄黃二錢冰片八分共碾勻雞子清方生白礬五分研極細末以雞蛋一個取清去黃合礬末攪勻灌入喉中蜜製附子方大附子一枚去皮臍切片洗淨鹹味再用甘草湯泡洗塗白蜜炭火炙熟每用一片噙咽候甘味盡換之搐鼻散白芷北辛川芎明雄牙皂各等分研末嗅之取嚏或納少許於鼻中已患未患均用海浮散真淨乳香沒藥等分去油用紙置微火上緩緩焙極干方研得細或加血蠍同研血蠍輕鬆者良堅硬者偽鳳凰衣散抱出雞子蛋殼名鳳凰窩洗淨取殼內白皮莫去血絲先曬乾微火焙燥橄欖核洗淨曬乾煅存性上洋茶共研細每末一兩入冰片五分碾勻紫金錠山慈菰去皮三兩五倍子三兩紅芽大戟兩半明雄黃五錢鏡辰砂五錢真麝香三錢共碾勻糯米飲和碧雪散蒲黃建黛硼砂甘草牙硝等分共碾勻如意金黃散花粉一兩大黃白芷薑黃黃柏各五錢川朴甘草蒼朮陳皮南星各二錢共為細末過篩蔥汁和白蜜調敷咽喉急症方咽喉腫痛取雄黃燕子泥用燒酒調勻令臥敷之涎出口開以陳壁土煎湯飲之此神方也牙關緊閉一敷即開雄黃恐難猝辦單用燕子泥亦可如無燕子泥用燒紙數張以燒酒浸溫貼喉下隨干隨換此以熱導熱之義也百發百中不可輕視少商穴圖説按少商穴屬手太陰經肺之經脈止處在兩手拇指內側爪甲后角上一韭葉許即是穴所諸書云穴在外側者非致起疑誤因辨而圖之凡咽喉急症重症飲食不進醫藥難救雖腫閉痛甚忌用刀針免致破爛惟以一人扶病人坐一人急將病人兩手自肩項處起捋下數十次極力趕將惡血毒氣使聚此穴用婦人扎髮油繩照圖扎住大指根隨以磁針刺穴擠出惡血奇效避瘟防護良法其法有五切莫空腹入瘟病家看病能飲者飲雄黃燒酒不能飲者食大蒜塗雄黃酒於鼻中或用人馬平安散男左女右以少許點目大眥其方用冰片麝香硃砂各五分牙硝一錢研細碾勻或用紫金錠水磨塗鼻孔一也每看病畢即浣手取搐鼻散嗅之取嚏二也用雄黃硃砂蒼朮北辛牙皂紫紅降香檀香鬼箭羽甘松廣木香公丁香丹參排草山奈以上各一錢麝香五釐冰片三分擇上吉日將各味合於淨室中勿令婦人雞犬及孝服人見用紅稠縫三角囊盛之佩身上並挂門戶上方內入虎頭骨斧頭木尤妙三也至病家行坐莫離客位不可起貪淫念四也疫盛時更宜內服避瘟丹其方用雄黃一兩炒丹參炒鬼箭羽炒熟小紅豆各二兩研細合勻煉蜜丸如梧桐子大飛過硃砂為衣曬乾每日空心用白湯吞五丸五也避瘟良法無過於此醫者病家並宜遵用使已病者易愈未病者不染豈徒喉科受益哉醫案張景嶽先生治一人喉痹十餘日頭面浮大喉頸粗極氣急聲啞口瘡痛楚至苦察其脈微弱之甚問前所服之藥皆芩連知柏之屬遂用鎮陰煎水煎以冷水頓冷徐徐咽下盡消如失薛立齋先生治一婦人咽間作痛潰而不斂諸藥不應先用土萆湯即土茯苓又名冷飯根數劑而斂又以四物湯加茯苓黃耆二十餘劑而安洪金鼎先生治一人喉中生一核微癢不痛用蛇床子燒煙吸於喉內立消此非實火乃虛風也故以此煙燻之又治一人喉中如懸一石榴細考醫通得一方用土牛膝根洗淨入好醋三五匙同抖汁就鼻孔滴入絲斷珠破而愈醫通云此非咽痛乃鼻中生紅絲如發懸黑泡如石榴垂挂咽門以致飲食不入也跋查十二經脈手陽明大腸足陽明胃足太陰脾手少陰心手太陽小腸足少陰腎手少陽三焦足少陽膽足厥陰肝並沖任督等脈均絡咽喉各經有病均能致咽喉腫痛舌乾起刺內經云火鬱發之謂發汗與宣吐並刺少商穴出血均取發散之義道光丙午歲春夏秋雨水稀少火勝剋金秋間遂有咽喉腫痛一症治稍不得其法遂致不救衆議紛紛無所措手有謂忌發散者謂宜清涼者究之迄無定見豫以鄙意度之發散之説自古以然其間有不能用發散者則以賦體素有陰虛陽虛之別耳如果少年體旺感受時疫非發散與攻下其熱不熄古語云治喉痹之火與救火同不可拘泥緩方與小方誤人性命若素稟陰虛者用發散與攻下則重竭其陰素稟陽虛者用發散與攻下則剝喪其陽遂成不救之症是不可以不慎元泰和二年大都瘟病東垣制普濟消毒飲活人無算時人謂之天方所用皆清涼解散之品惟肺有熱者須減去人參若陽虛而兼時疫則宜逍遙散與補中益氣湯之類補中兼散較為妥善至若格陽之症則又當用附桂八味地黃湯或鎮陰煎之類神而明之存乎其人不可拘執成見不必泥定古方豫因近年有喉症忌散之説故不揣固陋妄抒意見以俟高明之採擇焉至是書當增刪處已質之梧岡更願質之天下時道光二十七年歲次丁未冬月潘誠葆真氏謹識
